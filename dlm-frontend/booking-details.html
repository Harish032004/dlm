<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLM Booking Details</title>
    <style>
        :root {
            --pink: #ef2d83;
            --pink-dark: #c91567;
            --ink: #241723;
            --muted: #7a6572;
            --line: rgba(36, 23, 35, 0.1);
            --soft: #fff0f7;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Inter, "Segoe UI", sans-serif;
            color: var(--ink);
            background: linear-gradient(180deg, #fff3f8, #fff);
        }

        header {
            min-height: 76px;
            padding: 0 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(14px);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--ink);
            font-weight: 900;
            text-decoration: none;
        }

        .brand img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        .back-link {
            min-height: 42px;
            padding: 0 18px;
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            color: #fff;
            background: var(--pink);
            font-weight: 900;
            text-decoration: none;
        }

        main {
            width: min(100%, 1080px);
            margin: 0 auto;
            padding: 54px 20px 72px;
        }

        .intro {
            max-width: 720px;
            margin-bottom: 28px;
        }

        .intro h1 {
            margin: 0;
            font-size: clamp(34px, 5vw, 56px);
            line-height: 1.04;
        }

        .intro p {
            color: var(--muted);
            line-height: 1.7;
        }

        .booking-layout {
            display: grid;
            grid-template-columns: 0.9fr 1.2fr;
            gap: 24px;
            align-items: start;
        }

        .summary,
        .form-panel,
        .success-panel {
            border: 1px solid var(--line);
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 18px 42px rgba(143, 28, 82, 0.1);
        }

        .summary {
            padding: 24px;
        }

        .summary-kicker {
            width: fit-content;
            margin: 0 0 14px;
            padding: 7px 13px;
            border-radius: 999px;
            color: var(--pink-dark);
            background: var(--soft);
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .summary h2 {
            margin: 0;
            font-size: 28px;
            line-height: 1.12;
        }

        .summary-price {
            margin: 12px 0 18px;
            color: var(--pink-dark);
            font-size: 20px;
            font-weight: 950;
        }

        .summary-list {
            margin: 0;
            padding: 0;
            display: grid;
            gap: 11px;
            list-style: none;
            color: #604252;
            font-size: 14px;
            line-height: 1.5;
        }

        .summary-list strong {
            display: block;
            color: var(--ink);
        }

        .form-panel {
            padding: 24px;
        }

        form {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 15px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-size: 13px;
            font-weight: 900;
        }

        input,
        textarea {
            width: 100%;
            min-height: 46px;
            padding: 0 13px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            font: inherit;
        }

        textarea {
            min-height: 110px;
            padding-top: 12px;
            resize: vertical;
        }

        .wide {
            grid-column: 1 / -1;
        }

        button {
            width: fit-content;
            min-height: 48px;
            padding: 0 24px;
            border: 0;
            border-radius: 999px;
            color: #fff;
            background: var(--pink);
            font-weight: 950;
            cursor: pointer;
        }

        button:disabled {
            cursor: wait;
            opacity: 0.72;
        }

        .message {
            min-height: 22px;
            margin-top: 14px;
            color: var(--pink-dark);
            font-weight: 850;
        }

        .success-panel {
            display: none;
            margin-top: 24px;
            padding: 24px;
            border-color: rgba(239, 45, 131, 0.28);
            background: var(--soft);
        }

        .success-panel.open {
            display: block;
        }

        .success-panel h2 {
            margin: 0 0 8px;
        }

        .success-panel p {
            margin: 6px 0;
            color: #604252;
            font-weight: 750;
        }

        .receipt-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--line);
        }

        .receipt-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 950;
            font-size: 20px;
        }

        .receipt-brand img {
            width: 56px;
            height: 56px;
            border-radius: 50%;
        }

        .receipt-status {
            padding: 8px 14px;
            border-radius: 999px;
            color: #15803d;
            background: #dcfce7;
            font-size: 12px;
            font-weight: 950;
            text-transform: uppercase;
        }

        .receipt-grid {
            margin-top: 18px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .receipt-item {
            padding: 13px;
            border: 1px solid var(--line);
            border-radius: 10px;
            background: #fff;
        }

        .receipt-item span {
            display: block;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .receipt-item strong {
            display: block;
            margin-top: 5px;
            color: var(--ink);
        }

        .receipt-total {
            margin-top: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            border-radius: 12px;
            color: #fff;
            background: var(--pink);
            font-weight: 950;
        }

        .receipt-actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .receipt-actions button,
        .receipt-actions a {
            min-height: 42px;
            padding: 0 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 0;
            border-radius: 999px;
            color: #fff;
            background: var(--pink);
            font-weight: 900;
            text-decoration: none;
            cursor: pointer;
        }

        .receipt-actions .secondary {
            color: var(--pink);
            background: #fff;
            border: 1px solid rgba(239, 45, 131, 0.25);
        }

        @media (max-width: 820px) {
            header {
                padding: 0 18px;
            }

            .booking-layout,
            form,
            .receipt-grid {
                grid-template-columns: 1fr;
            }

            .receipt-head,
            .receipt-total {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <header>
        <a class="brand" href="index.html">
            <img src="assets/image.png" alt="DLM logo">
            DLM Studio
        </a>
        <a class="back-link" id="backLink" href="booking.html">Back</a>
    </header>

    <main>
        <section class="intro">
            <h1>Complete Your Booking Details</h1>
            <p>Confirm the selected slot, reserve it for 10 minutes, and complete the full payment securely through Razorpay.</p>
        </section>

        <section class="booking-layout">
            <aside class="summary" id="packageSummary">
                <p class="summary-kicker">Selected Slot</p>
                <h2>Loading package...</h2>
            </aside>

            <section class="form-panel">
                <form id="bookingForm">
                    <div>
                        <label for="customerName">Full Name</label>
                        <input id="customerName" name="customerName" required>
                    </div>

                    <div>
                        <label for="mobile">Mobile Number</label>
                        <input id="mobile" name="mobile" required>
                    </div>

                    <div>
                        <label for="email">Email</label>
                        <input id="email" name="email" type="email">
                    </div>

                    <div>
                        <label for="eventType">Event Type</label>
                        <input id="eventType" name="eventType" placeholder="Wedding, birthday, baby shower">
                    </div>

                    <div class="wide">
                        <label for="eventLocation">Event Location</label>
                        <input id="eventLocation" name="eventLocation">
                    </div>

                    <div class="wide">
                        <label for="requirements">Additional Requirements</label>
                        <textarea id="requirements" name="requirements"></textarea>
                    </div>

                    <div class="wide">
                        <button id="submitButton" type="submit">Reserve & Pay</button>
                        <div class="message" id="message"></div>
                    </div>
                </form>
            </section>
        </section>

        <section class="success-panel" id="successPanel"></section>
    </main>
    <script src="booking-details.js?v=4"></script>
</body>
</html>
