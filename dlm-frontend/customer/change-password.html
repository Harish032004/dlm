<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Temporary Password</title>
    <style>
        :root { --pink: #ef2d83; --ink: #241723; --muted: #7a6572; }
        * { box-sizing: border-box; }
        body { min-height: 100vh; margin: 0; display: grid; place-items: center; font-family: Inter, "Segoe UI", sans-serif; color: var(--ink); background: #fff7fb; }
        .card { width: min(92vw, 430px); padding: 34px; border-radius: 14px; background: #fff; box-shadow: 0 28px 70px rgba(143, 28, 82, 0.14); }
        h1 { margin: 0; font-size: 28px; }
        p { color: var(--muted); line-height: 1.5; }
        label { display: block; margin: 14px 0 7px; font-weight: 800; font-size: 13px; }
        input { width: 100%; height: 46px; padding: 0 14px; border: 1px solid rgba(36, 23, 35, 0.12); border-radius: 8px; font: inherit; }
        button { width: 100%; height: 48px; margin-top: 22px; border: 0; border-radius: 999px; color: #fff; background: var(--pink); font-weight: 900; cursor: pointer; }
        .message { min-height: 22px; margin-top: 14px; color: var(--pink); font-size: 13px; font-weight: 800; }
    </style>
</head>
<body>
    <form class="card" id="changePasswordForm">
        <h1>Change Password</h1>
        <p>You must change the temporary password before opening your private gallery.</p>
        <label>Temporary Password</label>
        <input name="currentPassword" type="password" required>
        <label>New Password</label>
        <input name="newPassword" type="password" minlength="8" required>
        <button type="submit">Save New Password</button>
        <div class="message" id="message"></div>
    </form>
    <script>
        const API_BASE = localStorage.getItem("dlmApiBase") || "http://localhost:8080";
        const token = localStorage.getItem("dlmCustomerToken");
        if (!token) location.href = "login.html";
        document.getElementById("changePasswordForm").addEventListener("submit", async event => {
            event.preventDefault();
            const message = document.getElementById("message");
            const payload = Object.fromEntries(new FormData(event.target).entries());
            const response = await fetch(`${API_BASE}/api/auth/change-password`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
                body: JSON.stringify(payload)
            });
            if (!response.ok) {
                message.textContent = "Could not change password. Check the temporary password.";
                return;
            }
            const data = await response.json();
            localStorage.setItem("dlmCustomerToken", data.token);
            message.textContent = "Password changed. Opening dashboard...";
            setTimeout(() => location.href = "dashboard.html", 700);
        });
    </script>
</body>
</html>
